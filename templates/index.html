<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invidious 動画検索</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #ff0000;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .search-box input {
            flex: 1;
            padding: 14px 20px;
            font-size: 16px;
            border: 1px solid #333;
            border-radius: 25px;
            outline: none;
            background: #1a1a1a;
            color: #fff;
            transition: 0.3s;
        }
        .search-box input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 8px rgba(255,0,0,0.3);
        }
        .search-box input::placeholder {
            color: #888;
        }
        .search-box button {
            padding: 14px 35px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover {
            background: #cc0000;
        }

        /* メインレイアウト */
        .main-layout {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }
        .video-list {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .player-wrapper {
            flex: 0 0 48%;
            position: sticky;
            top: 20px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #333;
        }
        .player-wrapper video {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 8px;
            background: #000;
        }
        .player-wrapper .video-title {
            font-size: 18px;
            font-weight: 600;
            margin: 12px 0 6px 0;
            color: #fff;
        }
        .player-wrapper .channel-name {
            color: #aaa;
            font-size: 14px;
        }
        .player-placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 18px;
        }
        .player-placeholder span {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
        }

        .video-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #2a2a2a;
        }
        .video-card:hover {
            transform: scale(1.03);
            border-color: #ff0000;
            box-shadow: 0 4px 20px rgba(255,0,0,0.15);
        }
        .video-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #222;
        }
        .video-info {
            padding: 12px 14px;
        }
        .video-title {
            font-weight: 600;
            font-size: 14px;
            margin: 0 0 4px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #fff;
        }
        .channel-name {
            color: #aaa;
            font-size: 13px;
            margin: 0 0 4px 0;
        }
        .video-meta {
            color: #666;
            font-size: 12px;
            margin: 0;
        }
        .thumbnail-wrapper {
            position: relative;
        }
        .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            font-size: 18px;
            color: #888;
            padding: 50px;
        }
        .no-result {
            text-align: center;
            font-size: 18px;
            color: #666;
            padding: 50px;
        }

        /* スマホ対応 */
        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column;
            }
            .player-wrapper {
                flex: 1;
                width: 100%;
                position: relative;
                top: 0;
                order: -1;
            }
            .video-list {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>▶️ Invidius 動画検索</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="動画のタイトルやYouTuber名を入力..." onkeydown="if(event.key==='Enter') searchVideos()">
        <button onclick="searchVideos()">検索</button>
    </div>

    <div class="main-layout">
        <!-- 右：プレイヤー -->
        <div class="player-wrapper" id="playerWrapper">
            <div class="player-placeholder" id="playerPlaceholder">
                <span>🎬</span>
                動画をクリックすると<br>ここに再生されます
            </div>
            <div id="playerContainer" style="display:none;">
                <video id="playerVideo" controls></video>
                <div class="video-title" id="playerTitle"></div>
                <div class="channel-name" id="playerChannel"></div>
            </div>
        </div>

        <!-- 左：動画一覧 -->
        <div class="video-list" id="results">
            <div class="loading">🔍 キーワードを入れて検索してみてください</div>
        </div>
    </div>
</div>

<script>
    let currentVideos = [];

    async function searchVideos() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) {
            alert('検索ワードを入力してください');
            return;
        }

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '<div class="loading">⏳ 読み込み中...</div>';

        try {
            const response = await fetch(`/search?q=${encodeURIComponent(query)}&limit=20`);
            const data = await response.json();

            if (data.error) {
                resultsDiv.innerHTML = `<div class="no-result">❌ ${data.error}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                resultsDiv.innerHTML = '<div class="no-result">😞 動画が見つかりませんでした</div>';
                return;
            }

            currentVideos = data;

            let html = '';
            data.forEach((video, index) => {
                const thumb = `https://img.youtube.com/vi/${video.videoId}/hqdefault.jpg`;
                const seconds = video.lengthSeconds || 0;
                const minutes = Math.floor(seconds / 60);
                const secs = seconds % 60;
                const duration = seconds > 0 ? `${minutes}:${secs.toString().padStart(2, '0')}` : '';

                html += `
                    <div class="video-card" onclick="playVideo(${index})">
                        <div class="thumbnail-wrapper">
                            <img src="${thumb}" alt="サムネイル" loading="lazy" onerror="this.src='https://via.placeholder.com/320x180?text=No+Image'">
                            ${duration ? `<span class="duration">${duration}</span>` : ''}
                        </div>
                        <div class="video-info">
                            <p class="video-title">${escapeHtml(video.title)}</p>
                            <p class="channel-name">${escapeHtml(video.author)}</p>
                            <p class="video-meta">👁️ ${video.viewCount?.toLocaleString() || 0} 回再生</p>
                        </div>
                    </div>
                `;
            });
            resultsDiv.innerHTML = html;

            // 最初の動画を自動再生
            if (data.length > 0) {
                playVideo(0);
            }

        } catch (error) {
            resultsDiv.innerHTML = `<div class="no-result">⚠️ エラーが発生しました: ${error.message}</div>`;
        }
    }

    function playVideo(index) {
        const video = currentVideos[index];
        if (!video) return;

        // 自分のサーバー経由で動画をストリーミング！
        const streamUrl = `/stream/${video.videoId}`;

        // プレイヤーを表示
        document.getElementById('playerPlaceholder').style.display = 'none';
        const container = document.getElementById('playerContainer');
        container.style.display = 'block';

        // videoタグにストリームURLをセット
        const videoElement = document.getElementById('playerVideo');
        videoElement.src = streamUrl;
        videoElement.load();  // 再読み込み
        videoElement.play().catch(e => {
            console.log('自動再生がブロックされました:', e);
        });

        // タイトルとチャンネル名を更新
        document.getElementById('playerTitle').textContent = video.title;
        document.getElementById('playerChannel').textContent = `🧑‍💻 ${video.author}`;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ページ読み込み時にプレイヤーを非表示にしておく
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('playerContainer').style.display = 'none';
        document.getElementById('playerPlaceholder').style.display = 'block';
    });
</script>
</body>
</html>
