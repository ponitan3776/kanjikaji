<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MyTube Viewer</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; padding: 20px; }
        .search-box { margin-bottom: 20px; text-align: center; }
        .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; padding: 10px; border-radius: 8px; }
        .card img { width: 100%; border-radius: 8px; }
        .card h3 { font-size: 1rem; margin: 10px 0; }
    </style>
</head>
<body>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="動画を検索...">
    <button onclick="searchVideos()">検索</button>
</div>

<div class="results" id="results"></div>

<script>
    async function searchVideos() {
        const query = document.getElementById('searchInput').value;
        const resultsDiv = document.getElementById('results');
        const instance = "https://invidious.privacydev.net";
        
        resultsDiv.innerHTML = "検索中...";

        try {
            const res = await fetch(`${instance}/api/v1/search?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            resultsDiv.innerHTML = "";
            data.forEach(video => {
                if (video.type === "video") {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${video.videoThumbnails[0].url}" alt="thumbnail">
                        <h3>${video.title}</h3>
                        <p>${video.author}</p>
                    `;
                    resultsDiv.appendChild(card);
                }
            });
        } catch (e) {
            resultsDiv.innerHTML = "エラーが発生しました。";
        }
    }
</script>
</body>
</html>
