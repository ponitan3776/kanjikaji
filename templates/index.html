<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Invidious 動画検索</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            padding: 12px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #ff0000; font-size: 22px; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 16px; }
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        .search-box input {
            flex: 1; padding: 12px 16px; font-size: 16px;
            border: 1px solid #333; border-radius: 25px;
            background: #1a1a1a; color: #fff;
        }
        .search-box input:focus { border-color: #ff0000; }
        .search-box button {
            padding: 12px 24px; background: #ff0000; color: white;
            border: none; border-radius: 25px; font-size: 16px; font-weight: bold;
            cursor: pointer;
        }
        .main-layout { display: flex; flex-direction: column; gap: 16px; }
        .player-wrapper {
            width: 100%; background: #1a1a1a; border-radius: 12px;
            padding: 12px; border: 1px solid #333; order: -1;
        }
        .player-wrapper video { width: 100%; aspect-ratio: 16/9; border-radius: 8px; background: #000; }
        .player-wrapper .video-title { font-size: 16px; font-weight: 600; margin: 10px 0 4px 0; }
        .player-wrapper .channel-name { color: #aaa; font-size: 14px; }
        .player-placeholder { text-align: center; padding: 50px 20px; color: #888; font-size: 16px; }
        .player-placeholder span { font-size: 40px; display: block; margin-bottom: 12px; }

        .video-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .video-card {
            background: #1a1a1a; border-radius: 10px; overflow: hidden;
            cursor: pointer; border: 1px solid #2a2a2a;
        }
        .video-card:active { transform: scale(0.97); }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #222; }
        .video-info { padding: 8px 10px; }
        .video-title { font-weight: 600; font-size: 13px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .channel-name { color: #aaa; font-size: 12px; }
        .video-meta { color: #666; font-size: 11px; }
        .thumbnail-wrapper { position: relative; }
        .duration {
            position: absolute; bottom: 6px; right: 6px;
            background: rgba(0,0,0,0.85); color: white;
            padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: bold;
        }
        .loading, .no-result { text-align: center; font-size: 16px; color: #888; padding: 40px 20px; grid-column: 1 / -1; }

        #debugArea {
            background: #1a1a2a;
            border: 1px solid #4444aa;
            color: #88ccff;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-family: monospace;
            margin-bottom: 12px;
            display: none;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        #debugArea.error { border-color: #ff4444; color: #ff8888; background: #2a1a1a; }
        #debugArea.success { border-color: #44ff44; color: #88ff88; background: #1a2a1a; }
        #debugArea.warn { border-color: #ffaa44; color: #ffcc88; background: #2a2a1a; }

        @media (min-width: 768px) {
            body { padding: 20px; }
            h1 { font-size: 28px; }
            .main-layout { flex-direction: row; align-items: flex-start; }
            .player-wrapper { flex: 0 0 48%; position: sticky; top: 16px; order: 0; }
            .video-list { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>▶️ Invidius</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="動画やチャンネルを検索..." onkeydown="if(event.key==='Enter') searchVideos()">
        <button onclick="searchVideos()">検索</button>
    </div>

    <div id="debugArea"></div>

    <div class="main-layout">
        <div class="player-wrapper" id="playerWrapper">
            <div class="player-placeholder" id="playerPlaceholder">
                <span>🎬</span>
                動画をタップすると再生されます
            </div>
            <div id="playerContainer" style="display:none;">
                <video id="playerVideo" controls playsinline></video>
                <div class="video-title" id="playerTitle"></div>
                <div class="channel-name" id="playerChannel"></div>
            </div>
        </div>

        <div class="video-list" id="results">
            <div class="loading">🔍 キーワードを入れて検索</div>
        </div>
    </div>
</div>

<script>
    let currentVideos = [];

    function debugLog(msg, type) {
        const el = document.getElementById('debugArea');
        el.style.display = 'block';
        el.className = type || '';
        el.textContent = msg;
        if (type !== 'error') {
            setTimeout(() => { el.style.display = 'none'; }, 20000);
        }
    }

    async function searchVideos() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) {
            debugLog('⚠️ 検索ワードを入力してください', 'error');
            return;
        }

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '<div class="loading">⏳ 読み込み中...</div>';
        document.getElementById('debugArea').style.display = 'none';

        try {
            const response = await fetch(`/search?q=${encodeURIComponent(query)}&limit=20`);
            const data = await response.json();

            if (data.error) {
                resultsDiv.innerHTML = `<div class="no-result">❌ ${data.error}</div>`;
                debugLog('検索エラー: ' + data.error, 'error');
                return;
            }

            if (!data || data.length === 0) {
                resultsDiv.innerHTML = '<div class="no-result">😞 動画が見つかりませんでした</div>';
                return;
            }

            currentVideos = data;

            let html = '';
            data.forEach((video, index) => {
                const thumb = `https://img.youtube.com/vi/${video.videoId}/hqdefault.jpg`;
                const seconds = video.lengthSeconds || 0;
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                const duration = seconds > 0 ? `${m}:${String(s).padStart(2, '0')}` : '';

                html += `
                    <div class="video-card" onclick="playVideo(${index})">
                        <div class="thumbnail-wrapper">
                            <img src="${thumb}" alt="サムネイル" loading="lazy" onerror="this.src='https://via.placeholder.com/320x180/222/666?text=No+Image'">
                            ${duration ? `<span class="duration">${duration}</span>` : ''}
                        </div>
                        <div class="video-info">
                            <p class="video-title">${escapeHtml(video.title)}</p>
                            <p class="channel-name">${escapeHtml(video.author)}</p>
                            <p class="video-meta">👁️ ${video.viewCount?.toLocaleString() || 0}</p>
                        </div>
                    </div>
                `;
            });
            resultsDiv.innerHTML = html;
            debugLog('✅ 検索成功！' + data.length + '件見つかりました', 'success');

            if (data.length > 0) {
                playVideo(0);
            }

        } catch (err) {
            resultsDiv.innerHTML = `<div class="no-result">⚠️ 通信エラー</div>`;
            debugLog('通信エラー: ' + err.message, 'error');
        }
    }

    function playVideo(index) {
        const video = currentVideos[index];
        if (!video) {
            debugLog('動画情報が見つかりません', 'error');
            return;
        }

        const videoId = video.videoId;
        const streamUrl = `/stream/${videoId}`;

        debugLog(`🎬 読み込み開始: ${video.title} (ID: ${videoId})`, '');

        document.getElementById('playerPlaceholder').style.display = 'none';
        const container = document.getElementById('playerContainer');
        container.style.display = 'block';

        const videoEl = document.getElementById('playerVideo');
        
        // エラーハンドリング（詳細表示）
        videoEl.onerror = function(e) {
            const err = videoEl.error;
            let msg = `❌ エラーコード: ${err ? err.code : '不明'}\n`;
            if (err) {
                switch(err.code) {
                    case 1: msg += 'MEDIA_ERR_ABORTED (読み込み中止)\n'; break;
                    case 2: msg += 'MEDIA_ERR_NETWORK (ネットワークエラー)\n'; break;
                    case 3: msg += 'MEDIA_ERR_DECODE (デコードエラー)\n'; break;
                    case 4: msg += 'MEDIA_ERR_SRC_NOT_SUPPORTED (形式非対応/URL無効)\n'; break;
                    default: msg += '不明なエラーコード\n';
                }
                msg += `メッセージ: ${err.message || '(空)'}\n`;
            }
            msg += `動画ID: ${videoId}\n`;
            msg += `ストリームURL: ${streamUrl}`;
            debugLog(msg, 'error');
            console.error('Video Error:', err);
        };

        videoEl.onloadeddata = function() {
            debugLog(`✅ 動画読み込み成功！ (ID: ${videoId})`, 'success');
        };

        videoEl.onloadstart = function() {
            debugLog(`⏳ 読み込み中... (ID: ${videoId})`, 'warn');
        };

        videoEl.src = streamUrl;
        videoEl.load();
        videoEl.play().catch(function(e) {
            console.log('自動再生ブロック:', e);
            debugLog(`ℹ️ 自動再生がブロックされました (ID: ${videoId})。再生ボタンを押してください`, 'warn');
        });

        document.getElementById('playerTitle').textContent = video.title;
        document.getElementById('playerChannel').textContent = '🧑‍💻 ' + video.author;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('playerContainer').style.display = 'none';
        document.getElementById('playerPlaceholder').style.display = 'block';
    });
</script>
</body>
</html>
