<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub</title>
    <style>
        :root { --bg: #0f0f0f; --text: #ffffff; --hover: #272727; }
        body { font-family: Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* ヘッダー */
        header { position: sticky; top: 0; background: var(--bg); padding: 15px; display: flex; justify-content: center; z-index: 100; border-bottom: 1px solid #333; }
        input { width: 500px; padding: 10px; border-radius: 20px; border: 1px solid #333; background: #121212; color: white; }
        button { padding: 10px 20px; border-radius: 20px; cursor: pointer; border: none; background: #fff; color: black; font-weight: bold; margin-left: 10px; }

        /* グリッドレイアウト */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .card { cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: scale(1.02); }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 12px; }
        .title { font-size: 1rem; margin-top: 10px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .author { font-size: 0.9rem; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <input type="text" id="q" placeholder="チャンネル名やタイトルで検索...">
    <button onclick="search()">検索</button>
</header>

<div id="results" class="grid"></div>

<script>
    async function search() {
        const q = document.getElementById('q').value;
        const container = document.getElementById('results');
        if (!q) return;

        container.innerHTML = "<p>読み込み中...</p>";
        
        try {
            const res = await fetch(`https://invidious.privacydev.net/api/v1/search?q=${encodeURIComponent(q)}`);
            if (!res.ok) throw new Error("通信エラー");
            
            const data = await res.json();
            container.innerHTML = ""; // 初期化

            if (data.length === 0) {
                container.innerHTML = "<p>結果が見つかりませんでした。</p>";
                return;
            }

            data.forEach(v => {
                if (v.type === "video") {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${v.videoThumbnails.find(t => t.quality === 'medium')?.url || v.videoThumbnails[0].url}" class="thumb">
                        <div class="title">${v.title}</div>
                        <div class="author">${v.author}</div>
                    `;
                    card.onclick = () => window.open(`https://www.youtube.com/watch?v=${v.videoId}`, '_blank');
                    container.appendChild(card);
                }
            });
        } catch (err) {
            container.innerHTML = `<p style="color:red;">エラーが発生しました: ${err.message}</p>`;
        }
    }
</script>
</body>
</html>
