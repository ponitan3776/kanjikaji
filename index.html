<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub Pro</title>
    <style>
        body { margin: 0; background: #0f0f0f; color: white; font-family: Roboto, Arial, sans-serif; }
        header { position: sticky; top: 0; background: #0f0f0f; padding: 15px; border-bottom: 1px solid #333; z-index: 1000; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #333; background: #121212; color: white; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #fff; font-weight: bold; cursor: pointer; }
        
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .card { cursor: pointer; }
        .thumb { width: 100%; aspect-ratio: 16/9; border-radius: 12px; object-fit: cover; }
        .title { margin-top: 8px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .author { font-size: 0.9rem; color: #aaa; margin-top: 4px; }
    </style>
</head>
<body>

<header>
    <input type="text" id="q" placeholder="動画やチャンネルを検索...">
    <button onclick="search()">検索</button>
</header>

<div id="results"></div>

<script>
    async function search() {
        const q = document.getElementById('q').value;
        const results = document.getElementById('results');
        if (!q) return;

        results.innerHTML = "読み込み中...";

        // CORS回避のために「corsproxy.io」を経由します
        const proxy = "https://corsproxy.io/?";
        const instance = "https://yewtu.be";
        const apiUrl = `${proxy}${encodeURIComponent(instance + "/api/v1/search?q=" + q)}`;

        try {
            const res = await fetch(apiUrl);
            if (!res.ok) throw new Error("サーバーからの応答がありません。");
            
            const data = await res.json();
            results.innerHTML = "";

            data.forEach(v => {
                if (v.type === "video") {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${instance}${v.videoThumbnails[0].url}" class="thumb">
                        <div class="title">${v.title}</div>
                        <div class="author">${v.author}</div>
                    `;
                    card.onclick = () => window.open(`https://www.youtube.com/watch?v=${v.videoId}`, '_blank');
                    results.appendChild(card);
                }
            });
        } catch (err) {
            results.innerHTML = `<div style="padding:20px;">エラーが発生しました。<br>詳細: ${err.message}<br><br>※サーバーが混雑している可能性があります。少し待ってから再度お試しください。</div>`;
        }
    }
</script>
</body>
</html>
